<!DOCTYPE html>
<html lang="en">
<head>
    <title> Security Project demo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <h1 class ="h1">Raven</h1>

    <div class="top-bar">
        <button id="startCameraBtn" class="nav-button" type="button">Start Camera</button>
        <button id="stopCameraBtn" class="nav-button" type="button" style="display:none;">Stop Camera</button>
        <a class="nav-button" href="/new-users">Review New Users</a>
    </div>

    <div id="cameraStatus" class="status"></div>
    <div id="verifiedContent"></div>

    <script>
        async function startCamera() {
            try {
                console.log('startCamera() called');
                const response = await fetch('/start-camera', { method: 'POST' });
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`${response.status} ${response.statusText}: ${text}`);
                }
                const data = await response.json();
                console.log('Backend response:', data.message);
                document.getElementById('cameraStatus').textContent = data.message;
                document.getElementById('stopCameraBtn').style.display = 'inline-block';
                document.getElementById('startCameraBtn').disabled = true;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('cameraStatus').textContent = `Camera error: ${error.message}`;
            }
        }

        function stopCamera() {
            document.getElementById('cameraStatus').textContent = 'Camera stopped';
            document.getElementById('stopCameraBtn').style.display = 'none';
        }

        document.getElementById('startCameraBtn').addEventListener('click', startCamera);
        document.getElementById('stopCameraBtn').addEventListener('click', stopCamera);

        async function loadVerifiedFaces() {
            const container = document.getElementById('verifiedContent');
            if (!container) {
                console.error('Verified content container not found');
                return;
            }
            container.innerHTML = '<div class="empty-state">Loading verified faces...</div>';
            try {
                const response = await fetch('/api/verified-users');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                if (!data.items || data.items.length === 0) {
                    container.innerHTML = '<div class="empty-state">No verified faces yet.</div>';
                    return;
                }
                container.innerHTML = '';
                data.items.forEach(filename => {
                    const item = document.createElement('div');
                    item.className = 'verified-item';
                    item.innerHTML = `\n <img src="/images/verified/${encodeURIComponent(filename)}" alt="${filename}">\n                    <span>${filename}</span>\n `;
                    container.appendChild(item);
                });
            } catch (error) {
                container.innerHTML = `<div class="empty-state">Failed to load verified faces: ${error.message}</div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadVerifiedFaces);

  </script>

 
    <br>

    <textarea class = "text" rows="1" placeholder="bruh"></textarea>
     

</body>
</html>
